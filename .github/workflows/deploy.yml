name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy-web:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_gKYvIAs8HxbFboywMqirA15g
      VERCEL_PROJECT_ID: prj_eNM6izoF80KOHVq3VIShRVmGeubs

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: pnpm exec vercel build --prod --yes --token="$VERCEL_TOKEN"
      - run: pnpm exec vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"

  deploy-api:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_gKYvIAs8HxbFboywMqirA15g
      VERCEL_PROJECT_ID: prj_qqU7JjFUQmgVN3TY2JyCFHfRuRg8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vercel pull --yes --environment=production --cwd apps/api --token="$VERCEL_TOKEN"
      - run: pnpm exec vercel build --prod --yes --cwd apps/api --token="$VERCEL_TOKEN"
      - run: pnpm exec vercel deploy --prebuilt --prod --yes --cwd apps/api --token="$VERCEL_TOKEN"
